<nav x-data="{searching: false}">
    <div class="flex items-center justify-between flex-wrap py-10 max-w-5xl mx-auto">
        <div class="text-md antialiased font-medium" x-show="! searching">
            <a href="/" class="block text-xl lg:inline-block mr-12 font-black">{{ settings:site_name }}</a>
        </div>
        <div class="block lg:hidden" x-show="! searching">
            <button class="flex items-center px-3 text-gray-800" x-bind:class="{'hidden': showMobileNav}" @click="showMobileNav = true">
                <svg class="fill-current h-5 w-5" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <title>Open Menu</title>
                    <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z" />
                </svg>
            </button>
            <button class="items-center px-3 text-gray-800" x-bind:class="{'flex': showMobileNav, 'hidden': ! showMobileNav}" @click="showMobileNav = false" x-cloak>
                <svg class="fill-current h-5 w-5" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <title>Close Menu</title>
                    <path
                        d="M10 8.586L2.929 1.515 1.515 2.929 8.586 10l-7.071 7.071 1.414 1.414L10 11.414l7.071 7.071 1.414-1.414L11.414 10l7.071-7.071-1.414-1.414L10 8.586z" />
                </svg>
            </button>
        </div>
        <div class="w-full lg:w-auto lg:flex lg:flex-1 items-center" @click.outside="showMobileNav = false" x-show="(showMobileNav || ! showMobileNav) && ! searching" x-bind:class="{'hidden': showMobileNav === false}" :class="{'lg:flex': true}">
            {{ nav }}
            <a href="{{ url }}" class="block {{ is_current || is_parent ?= 'font-medium text-gray-800' }} mt-4 lg:inline-block text-gray-600 hover:text-gray-800 lg:mt-0 mr-12">
                {{ title }}
            </a>
            {{ /nav }}
        </div>
        <button class="hover:text-gray-600 transition-all duration-100 outline-hidden ml-auto" @click="searching = true; $nextTick(() => { $refs.search.focus() })" x-show="! searching" aria-label="Search the site">
            {{ svg src="search" class="w-6 h-6" }}
        </button>
        <form action="/search" x-show="searching" x-cloak class="flex-1 flex items-center gap-3">
            <button type="button" @click="searching = false" class="hover:text-gray-600 transition-all duration-100" aria-label="Close search">
                {{ svg src="search" class="w-6 h-6" }}
            </button>
            <input
                name="q"
                type="text"
                class="flex-1 outline-hidden px-2 py-1 border-b border-gray-300 focus:border-gray-800"
                placeholder="Search..."
                x-on:blur="searching = false"
                @keydown.esc="searching = false"
                x-ref="search"
            />
        </form>
    </div>
</nav>
