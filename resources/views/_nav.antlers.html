<nav x-data="{searching: false, showMobileNav: false}">
    <div class="py-10 max-w-5xl mx-auto">
        <!-- Mobile/Desktop Header -->
        <div class="flex items-center justify-between">
            <div class="text-md antialiased font-medium" x-show="! searching">
                <a href="/" class="block text-xl font-black">{{ settings:site_name }}</a>
            </div>

            <!-- Desktop Nav -->
            <div class="hidden lg:flex lg:flex-1 lg:items-center lg:ml-12" x-show="! searching">
                {{ nav }}
                <a href="{{ url }}" class="inline-block {{ is_current || is_parent ?= 'font-medium text-gray-800' }} text-gray-600 hover:text-gray-800 mr-12">
                    {{ title }}
                </a>
                {{ /nav }}
            </div>

            <!-- Desktop Search Button -->
            <button class="hidden lg:block hover:text-gray-600 transition-all duration-100 outline-hidden ml-auto" @click="searching = true; $nextTick(() => { $refs.search.focus() })" x-show="! searching" x-cloak aria-label="Search the site">
                {{ svg src="search" class="w-6 h-6" }}
            </button>

            <!-- Mobile Menu Button -->
            <button class="lg:hidden flex items-center px-3 text-gray-800" x-show="!searching" @click="showMobileNav = !showMobileNav">
                <svg class="fill-current h-5 w-5" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" x-show="!showMobileNav">
                    <title>Open Menu</title>
                    <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z" />
                </svg>
                <svg class="fill-current h-5 w-5" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" x-show="showMobileNav" x-cloak>
                    <title>Close Menu</title>
                    <path d="M10 8.586L2.929 1.515 1.515 2.929 8.586 10l-7.071 7.071 1.414 1.414L10 11.414l7.071 7.071 1.414-1.414L11.414 10l7.071-7.071-1.414-1.414L10 8.586z" />
                </svg>
            </button>

            <!-- Search Form (shown when searching) -->
            <form action="/search" x-show="searching" x-cloak class="flex-1 flex items-center gap-3">
                <button type="button" @click="searching = false" class="hover:text-gray-600 transition-all duration-100" aria-label="Close search">
                    {{ svg src="search" class="w-6 h-6" }}
                </button>
                <input
                    name="q"
                    type="text"
                    class="flex-1 outline-hidden px-2 py-1 border-b border-gray-300 focus:border-gray-800"
                    placeholder="Search..."
                    x-on:blur="searching = false"
                    @keydown.esc="searching = false"
                    x-ref="search"
                />
            </form>
        </div>

        <!-- Mobile Nav Menu -->
        <div class="lg:hidden mt-4" x-show="showMobileNav && !searching" x-cloak @click.outside="showMobileNav = false">
            {{ nav }}
            <a href="{{ url }}" class="block {{ is_current || is_parent ?= 'font-medium text-gray-800' }} text-gray-600 hover:text-gray-800 py-2">
                {{ title }}
            </a>
            {{ /nav }}
            <button class="flex items-center gap-2 text-gray-600 hover:text-gray-800 py-2 mt-2" @click="searching = true; showMobileNav = false; $nextTick(() => { $refs.search.focus() })">
                {{ svg src="search" class="w-5 h-5" }}
                <span>Search</span>
            </button>
        </div>
    </div>
</nav>
